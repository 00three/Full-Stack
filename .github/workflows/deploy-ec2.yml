name: Deploy Full-Stack to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-full-stack-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Full-Stack services
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'REMOTE'
            set -euo pipefail
            cd /opt/ai-breaking-news/Full-Stack
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            sudo docker compose up -d --build postgres backend ingest-worker
            sudo docker compose ps
            sudo docker image prune -f
          REMOTE
