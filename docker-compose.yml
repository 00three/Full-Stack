services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${PG_DATABASE:-rag_db}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./rag/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  crawler:
    build:
      context: ${CRAWLER_CONTEXT:-../Crawler}
      dockerfile: Dockerfile
    command:
      - sh
      - -lc
      - python main.py --mode schedule --interval "$${CRAWLER_INTERVAL_MINUTES:-10}" --limit "$${CRAWLER_LIMIT:-10}"
    environment:
      CRAWLER_INTERVAL_MINUTES: ${CRAWLER_INTERVAL_MINUTES:-10}
      CRAWLER_LIMIT: ${CRAWLER_LIMIT:-10}
      CRAWLER_OUTBOX_DIR: ${CRAWLER_OUTBOX_DIR:-/shared/outbox}
    volumes:
      - crawler-shared:/shared
      - crawler-state:/app/data/states

  ingest-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "rag.ingest_worker"]
    cpus: "${INGEST_CPUS:-4.0}"
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DATABASE: ${PG_DATABASE:-rag_db}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      BEDROCK_REGION: ${BEDROCK_REGION:-ap-northeast-2}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
      BEDROCK_DEFAULT_MODEL_KEY: ${BEDROCK_DEFAULT_MODEL_KEY:-claude-sonnet-4-6}
      BEDROCK_MODEL_CATALOG_JSON: ${BEDROCK_MODEL_CATALOG_JSON:-}
      ARTICLE_STYLE: ${ARTICLE_STYLE:-default}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      LLM_EXTRACT_MAX_TOKENS: ${LLM_EXTRACT_MAX_TOKENS:-500}
      LLM_GENERATE_MAX_TOKENS: ${LLM_GENERATE_MAX_TOKENS:-8192}
      LLM_EXTRACT_MODEL_ID: ${LLM_EXTRACT_MODEL_ID:-global.anthropic.claude-haiku-4-5-20251001-v1:0}
      LLM_FAST_EXTRACT: ${LLM_FAST_EXTRACT:-1}
      LLM_EXTRACT_MAIN_MAX_CHARS: ${LLM_EXTRACT_MAIN_MAX_CHARS:-1800}
      LLM_EXTRACT_REF_MAX_CHARS: ${LLM_EXTRACT_REF_MAX_CHARS:-700}
      LLM_GENERATE_MAIN_MAX_CHARS: ${LLM_GENERATE_MAIN_MAX_CHARS:-4200}
      LLM_GENERATE_REF_MAX_CHARS: ${LLM_GENERATE_REF_MAX_CHARS:-1200}
      LLM_MAX_RELATED_CHUNKS: ${LLM_MAX_RELATED_CHUNKS:-5}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      CRAWLER_OUTBOX_DIR: ${CRAWLER_OUTBOX_DIR:-/shared/outbox}
      CRAWLER_PROCESSED_DIR: ${CRAWLER_PROCESSED_DIR:-/shared/processed}
      INGEST_POLL_SECONDS: ${INGEST_POLL_SECONDS:-15}
      INGEST_USE_CONTEXT: ${INGEST_USE_CONTEXT:-0}
      INGEST_DEDUP: ${INGEST_DEDUP:-1}
      PYTORCH_NUM_THREADS: ${PYTORCH_NUM_THREADS:-4}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-4}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-4}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-4}
      VECLIB_MAXIMUM_THREADS: ${VECLIB_MAXIMUM_THREADS:-4}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      HF_HOME: /models/hf
    volumes:
      - crawler-shared:/shared
      - hf-cache:/models/hf
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DATABASE: ${PG_DATABASE:-rag_db}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      BEDROCK_REGION: ${BEDROCK_REGION:-ap-northeast-2}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
      BEDROCK_DEFAULT_MODEL_KEY: ${BEDROCK_DEFAULT_MODEL_KEY:-claude-sonnet-4-6}
      BEDROCK_MODEL_CATALOG_JSON: ${BEDROCK_MODEL_CATALOG_JSON:-}
      ARTICLE_STYLE: ${ARTICLE_STYLE:-default}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      LLM_EXTRACT_MAX_TOKENS: ${LLM_EXTRACT_MAX_TOKENS:-500}
      LLM_GENERATE_MAX_TOKENS: ${LLM_GENERATE_MAX_TOKENS:-8192}
      LLM_EXTRACT_MODEL_ID: ${LLM_EXTRACT_MODEL_ID:-global.anthropic.claude-haiku-4-5-20251001-v1:0}
      LLM_FAST_EXTRACT: ${LLM_FAST_EXTRACT:-1}
      LLM_EXTRACT_MAIN_MAX_CHARS: ${LLM_EXTRACT_MAIN_MAX_CHARS:-1800}
      LLM_EXTRACT_REF_MAX_CHARS: ${LLM_EXTRACT_REF_MAX_CHARS:-700}
      LLM_GENERATE_MAIN_MAX_CHARS: ${LLM_GENERATE_MAIN_MAX_CHARS:-4200}
      LLM_GENERATE_REF_MAX_CHARS: ${LLM_GENERATE_REF_MAX_CHARS:-1200}
      LLM_MAX_RELATED_CHUNKS: ${LLM_MAX_RELATED_CHUNKS:-5}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      HF_HOME: /models/hf
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/models/hf
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  crawler-shared:
  crawler-state:
  hf-cache:
